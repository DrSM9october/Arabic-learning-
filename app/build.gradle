plugins {
    id 'com.android.application'
}

android {
    namespace 'com.yourapp.arabiclearning'
    compileSdk 33   // از 34 به 33 تغییر دهید

    defaultConfig {
        applicationId "com.yourapp.arabiclearning"
        minSdk 21
        targetSdk 33   // از 34 به 33 تغییر دهید
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
}
